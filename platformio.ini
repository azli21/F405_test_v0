; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:genericSTM32F405RG]
platform = ststm32
board = genericSTM32F405RG
framework = arduino
upload_protocol = stlink
; upload_protocol = custom  ; USB DFU via STM32CubeProgrammer (ROM bootloader not supported on this board)
; upload_command = "C:\Program Files\STMicroelectronics\STM32Cube\STM32CubeProgrammer\bin\STM32_Programmer_CLI.exe" -c port=USB1 -d "$SOURCE" 0x08000000 -rst
build_flags =
    -D USBCON
    -D USBD_USE_CDC
monitor_port = COM3
monitor_speed = 115200